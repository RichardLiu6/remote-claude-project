<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Remote Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Prevent rubber-band scrolling on iOS — CSS only, no JS preventDefault */
      position: fixed;
      width: 100%;
      overscroll-behavior: none;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      min-height: 48px;
    }
    #topbar select {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #533483;
      border-radius: 6px;
      font-size: 15px;
      -webkit-appearance: none;
      /* Prevent text overflow in select */
      text-overflow: ellipsis;
    }
    #topbar button {
      padding: 8px 12px;
      background: #533483;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 36px;
      /* Minimum touch target */
      min-width: 44px;
    }
    #topbar button:active { background: #6a42a0; }
    #topbar button:disabled { opacity: 0.4; }
    #refresh-btn {
      background: #0f3460;
      color: #a0c4ff;
    }
    #refresh-btn:active { background: #1a3a6e; }

    /* Status bar */
    #status {
      padding: 3px 12px;
      font-size: 11px;
      color: #666;
      background: #12192e;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      min-height: 20px;
      display: flex;
      align-items: center;
    }
    #status.connected { color: #4ade80; }
    #status.error { color: #f87171; }

    /* Terminal container */
    #terminal-container {
      flex: 1;
      overflow: hidden;
      /* Ensure xterm fills the container */
      position: relative;
      padding: 0 8px;
      touch-action: none;  /* JS handles all touch scroll via touchmove handler */
    }
    @media (max-width: 768px) {
      #terminal-container { padding: 0 2px; }
    }
    #terminal-container .xterm {
      height: 100%;
      touch-action: none !important;  /* Let JS handle all touch — browser native scroll fights with scrollLines() */
    }
    #terminal-container .xterm-screen {
      touch-action: none !important;  /* Same — JS handles scroll via touchmove */
    }
    #terminal-container .xterm-viewport {
      touch-action: none !important;  /* Prevent browser from consuming touch gestures */
      overscroll-behavior: contain;
    }

    /* Hidden textarea for mobile keyboard capture.
       Positioned off-screen so it never overlays xterm canvas
       (overlay causes iOS compositing to break CJK/emoji rendering). */
    #overlay-input {
      position: fixed;
      bottom: 0;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0.01; /* Not 0 — iOS needs non-zero opacity to trigger keyboard */
      border: none;
      outline: none;
      resize: none;
      font-size: 16px; /* Prevent iOS auto-zoom */
      padding: 0;
      margin: 0;
      -webkit-appearance: none;
      display: none; /* Shown only on mobile after connect */
    }

    /* Floating quick-bar (above keyboard on mobile) */
    #quick-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(22, 33, 62, 0.92);
      border-top: 1px solid #233a6a;
      padding: 6px 10px;
      padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
    }
    #quick-bar::-webkit-scrollbar { display: none; }

    #quick-bar button {
      padding: 7px 13px;
      background: #1e3155;
      color: #c8d8f0;
      border: 1px solid #2d4a7a;
      border-radius: 5px;
      font-size: 13px;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      min-height: 34px;
      letter-spacing: 0.01em;
    }
    #quick-bar button:active {
      background: #533483;
      border-color: #6a42a0;
      color: #ffffff;
    }
    #quick-bar .done-btn {
      background: #533483;
      color: #ffffff;
      border-color: #6a42a0;
    }
    #quick-bar .select-btn.active {
      background: #1e6f50;
      color: #ffffff;
      border-color: #2a9d6f;
    }

    /* Selectable text overlay for mobile Select mode */
    #select-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      background: rgba(26, 26, 46, 0.95);
      color: #e0e0e0;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.2;
      white-space: pre;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      -webkit-user-select: text;
      user-select: text;
      padding: 4px 2px;
      display: none;
    }

    /* Session picker */
    #picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      gap: 12px;
      padding: 28px 16px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #picker h2 {
      font-weight: 400;
      color: #8899bb;
      font-size: 17px;
      letter-spacing: 0.03em;
      text-align: center;
      margin-bottom: 4px;
    }

    .session-card {
      width: 100%;
      max-width: 440px;
      padding: 14px 16px;
      background: #16213e;
      border: 1px solid #233a6a;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      /* Minimum touch target height */
      min-height: 60px;
    }
    .session-card:active {
      border-color: #7c5cbf;
      background: #1d2d52;
    }

    .session-name {
      font-size: 17px;
      font-weight: 600;
      color: #d0ddff;
      letter-spacing: 0.01em;
    }
    .session-meta {
      font-size: 12px;
      color: #607090;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .no-sessions {
      color: #556070;
      font-style: italic;
      text-align: center;
      line-height: 1.6;
    }

    /* Picker action button */
    .picker-btn {
      padding: 10px 24px;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
      min-width: 120px;
    }
    .picker-btn:active { opacity: 0.8; }

    /* Responsive: slightly larger text on wider phones */
    @media (min-width: 390px) {
      #quick-bar button { font-size: 14px; padding: 7px 15px; }
    }
  </style>
</head>
<body>

<div id="topbar" style="display:none">
  <select id="session-select"></select>
  <button id="refresh-btn" onclick="loadSessions()">Refresh</button>
  <button id="disconnect-btn" onclick="disconnect()">Disconnect</button>
</div>
<div id="status" aria-live="polite" aria-atomic="true"></div>
<div id="terminal-container">
  <div id="picker"><h2>Loading sessions...</h2></div>
  <div id="select-overlay"></div>
  <textarea id="overlay-input"
    autocomplete="off" autocorrect="off" autocapitalize="off"
    spellcheck="false" enterkeyhint="send"
    aria-label="Terminal input"></textarea>
  <input type="file" id="file-upload" accept="image/*" style="display:none">
</div>

<div id="quick-bar" role="toolbar" aria-label="Quick keys"></div>
<div id="debug-overlay" style="display:none; position:fixed; top:0; left:0; right:0; height:40vh;
  background:rgba(0,0,0,0.88); color:#0f0; font:11px/1.4 monospace; z-index:9999;
  overflow-y:auto; padding:8px; pointer-events:auto;">
  <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
    <span style="color:#ff0;font-weight:bold;">Event Debug</span>
    <button onclick="document.getElementById('debug-overlay').querySelector('#debug-log').innerHTML=''"
      style="background:#333;color:#fff;border:none;padding:2px 8px;border-radius:3px;">Clear</button>
  </div>
  <div id="debug-log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
  let term = null;
  let ws = null;
  let fitAddon = null;
  let currentSession = null;
  let isComposing = false;

  // Reconnection state
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  const MAX_RECONNECT_ATTEMPTS = 10;
  const RECONNECT_BASE_DELAY = 1000;
  let intentionalDisconnect = false;

  // Handler references for cleanup
  let resizeHandler = null;
  let vpResizeHandler = null;
  let selectMode = false;  // When true, taps allow text selection instead of opening keyboard

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  const picker = document.getElementById('picker');
  const topbar = document.getElementById('topbar');
  const statusEl = document.getElementById('status');
  const container = document.getElementById('terminal-container');
  const sessionSelect = document.getElementById('session-select');
  const overlayInput = document.getElementById('overlay-input');
  const quickBar = document.getElementById('quick-bar');
  const selectOverlay = document.getElementById('select-overlay');

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  // Helper: send data to WebSocket if open
  function wsSend(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(data);
      return true;
    }
    return false;
  }

  // --- Voice playback ---
  let audioUnlocked = false;
  const voicePlayer = document.createElement('audio');
  voicePlayer.setAttribute('playsinline', '');
  voicePlayer.setAttribute('preload', 'auto');
  document.body.appendChild(voicePlayer); // Must be in DOM for Chrome mobile
  let _uploadBtnRef = null;  // set in buildQuickBar
  let _pendingVoiceUrl = null; // store URL if play blocked

  function unlockAudio() {
    if (!audioUnlocked) {
      // Play a real silent WAV from server to unlock Chrome mobile audio.
      // Data URIs don't reliably register as user-gesture-activated on Chrome.
      voicePlayer.src = '/audio/silence.wav';
      voicePlayer.play().then(() => {
        audioUnlocked = true;
        console.log('[voice] audio unlocked via silence.wav');
        // If a voice event arrived before unlock, play it now
        if (_pendingVoiceUrl) {
          voicePlayer.src = _pendingVoiceUrl;
          voicePlayer.play().catch(() => {});
          _pendingVoiceUrl = null;
        }
      }).catch(() => {
        console.log('[voice] silence.wav play failed');
      });
      return;
    }
    if (_pendingVoiceUrl) {
      voicePlayer.src = _pendingVoiceUrl;
      voicePlayer.play().catch(() => {});
      _pendingVoiceUrl = null;
    }
  }

  function handleVoiceEvent(payload) {
    if (!payload.url) return;
    voicePlayer.src = payload.url;
    voicePlayer.play().then(() => { audioUnlocked = true; }).catch(() => {
      // If blocked, store for next user tap
      _pendingVoiceUrl = payload.url;
    });
  }

  // --- Notify handling ---
  let _titleFlashTimer = null;
  const _originalTitle = document.title;

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.stop(ctx.currentTime + 0.3);
      setTimeout(() => ctx.close(), 500);
    } catch (e) {
      console.log('[notify] beep failed:', e);
    }
  }

  function startTitleFlash() {
    if (_titleFlashTimer) return; // already flashing
    let toggle = false;
    _titleFlashTimer = setInterval(() => {
      document.title = toggle ? _originalTitle : '\u26A0 \u9700\u8981\u64CD\u4F5C';
      toggle = !toggle;
    }, 1000);
  }

  function stopTitleFlash() {
    if (_titleFlashTimer) {
      clearInterval(_titleFlashTimer);
      _titleFlashTimer = null;
      document.title = _originalTitle;
    }
  }

  // Stop title flashing when user focuses the page
  window.addEventListener('focus', stopTitleFlash);

  function handleNotifyEvent(payload) {
    const title = payload.title || 'Claude Terminal';
    const message = payload.message || '';

    // Browser notification
    if (Notification.permission === 'granted') {
      new Notification(title, { body: message });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') new Notification(title, { body: message });
      });
    }

    // Flash page title
    startTitleFlash();

    // Play beep sound
    playBeep();
  }

  async function loadSessions() {
    try {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();
      renderPicker(sessions);
      renderSelect(sessions);
      // Auto-reconnect: if a session was active before refresh, reconnect to it
      if (!currentSession) {
        const saved = sessionStorage.getItem('currentSession');
        if (saved && sessions.some(s => s.name === saved)) {
          connect(saved);
        }
      }
    } catch (e) {
      picker.innerHTML = '<h2>Failed to load sessions</h2>';
    }
  }

  function renderPicker(sessions) {
    if (!sessions.length) {
      picker.innerHTML = '<h2>Sessions</h2><p class="no-sessions">No tmux sessions running.<br>Use start-claude.sh to start one.</p>';
      picker.innerHTML += '<button class="picker-btn" style="background:#533483" onclick="loadSessions()">Refresh</button>';
      return;
    }
    let html = '<h2>Select Session</h2>';
    sessions.forEach(s => {
      const time = new Date(s.created * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      html += `<div class="session-card" onclick="connect('${s.name}')">
        <div class="session-name">${s.name}</div>
        <div class="session-meta">started ${time} · ${s.windows} window(s)</div>
      </div>`;
    });
    html += '<button class="picker-btn" style="margin-top:8px;background:#0f3460" onclick="loadSessions()">Refresh</button>';
    picker.innerHTML = html;
  }

  function renderSelect(sessions) {
    sessionSelect.innerHTML = sessions.map(s =>
      `<option value="${s.name}">${s.name}</option>`
    ).join('');
    // Restore selected value after rebuilding dropdown
    if (currentSession) sessionSelect.value = currentSession;
  }

  // Send raw key sequence to terminal (quick buttons)
  function sendKey(key) {
    wsSend(key);
    if (isMobile) overlayInput.focus();
  }

  // --- Select mode: selectable text overlay ---
  // Reads terminal buffer content and shows it in a native-selectable div
  // so iOS long-press text selection works (canvas doesn't support native select).
  function showSelectOverlay() {
    if (!term) return;
    const buf = term.buffer.active;
    const lines = [];
    for (let i = 0; i < buf.length; i++) {
      const line = buf.getLine(i);
      if (line) lines.push(line.translateToString(true).replace(/[·.]{3,}$/, ''));
    }
    // Trim trailing empty lines
    while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
    // Linkify URLs so they're tappable on mobile
    const urlRe = /https?:\/\/[^\s<>"')\]]+/g;
    const escaped = lines.join('\n')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    selectOverlay.innerHTML = escaped.replace(urlRe, m =>
      `<a href="${m}" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline">${m}</a>`
    );
    // Match terminal font size
    selectOverlay.style.fontSize = (term.options.fontSize || 12) + 'px';
    selectOverlay.style.display = 'block';
  }

  function hideSelectOverlay() {
    selectOverlay.style.display = 'none';
    selectOverlay.textContent = '';
  }

  // Build quick-bar buttons (called once; buttons use mousedown to prevent blur
  // without blocking native horizontal touch-scroll on the quick-bar)
  function buildQuickBar() {
    const keys = [
      { label: 'NL',   seq: '\x1b\r' },
      { label: 'Tab',  seq: '\t' },
      { label: '⇧Tab', seq: '\x1b[Z' },
      { label: '←',    seq: '\x1b[D' },
      { label: '→',    seq: '\x1b[C' },
      { label: '↑',    seq: '\x1b[A' },
      { label: '↓',    seq: '\x1b[B' },
      { label: '^C',   seq: '\x03' },
      { label: 'Esc',  seq: '\x1b' },
      { label: '/',    seq: '/' },
    ];
    quickBar.innerHTML = '';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.textContent = k.label;
      btn.setAttribute('aria-label', k.label);
      // Use mousedown + preventDefault to keep overlay focused (keyboard stays open)
      // without blocking the browser's native horizontal touch-scroll on the quick-bar.
      btn.addEventListener('mousedown', (e) => { e.preventDefault(); });
      btn.addEventListener('click', (e) => { unlockAudio(); sendKey(k.seq); });
      quickBar.appendChild(btn);
    });
    // "Select" button — toggle text selection mode
    const selBtn = document.createElement('button');
    selBtn.textContent = 'Select';
    selBtn.setAttribute('aria-label', 'Toggle text selection mode');
    function updateSelBtn() {
      selBtn.className = selectMode ? 'select-btn active' : 'select-btn';
      selBtn.textContent = selectMode ? 'Select ✓' : 'Select';
    }
    selBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    selBtn.addEventListener('click', () => {
      selectMode = !selectMode;
      updateSelBtn();
      if (selectMode) {
        overlayInput.blur();
        showSelectOverlay(); // Show native-selectable text over canvas
      } else {
        hideSelectOverlay();
        overlayInput.focus();
      }
      adjustQuickBarPosition();
    });
    quickBar.appendChild(selBtn);

    // "Done" button — blurs overlay to dismiss keyboard, exits select mode
    const doneBtn = document.createElement('button');
    doneBtn.textContent = 'Done';
    doneBtn.className = 'done-btn';
    doneBtn.setAttribute('aria-label', 'Dismiss keyboard');
    doneBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    doneBtn.addEventListener('click', () => {
      selectMode = false;
      updateSelBtn();
      hideSelectOverlay();
      overlayInput.blur();
      adjustQuickBarPosition();
    });
    quickBar.appendChild(doneBtn);

    // "Paste" button — fetches Mac clipboard via /api/clipboard, types it into terminal
    const pasteBtn = document.createElement('button');
    pasteBtn.textContent = 'Paste';
    pasteBtn.setAttribute('aria-label', 'Paste Mac clipboard into terminal');
    pasteBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    pasteBtn.addEventListener('click', async () => {
      try {
        pasteBtn.textContent = '...';
        const res = await fetch('/api/clipboard');
        const { text } = await res.json();
        if (text) {
          wsSend(text);
          pasteBtn.textContent = 'OK!';
        } else {
          pasteBtn.textContent = 'Empty';
        }
      } catch {
        pasteBtn.textContent = 'Fail';
      }
      setTimeout(() => { pasteBtn.textContent = 'Paste'; }, 1500);
    });
    quickBar.appendChild(pasteBtn);

    // Upload button — send phone photos to remote Mac for Claude Code
    const uploadBtn = document.createElement('button');
    uploadBtn.textContent = '\u{1F4F7}';
    uploadBtn.setAttribute('aria-label', 'Upload photo to remote');
    _uploadBtnRef = uploadBtn;
    uploadBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    uploadBtn.addEventListener('click', () => {
      document.getElementById('file-upload').click();
    });
    quickBar.appendChild(uploadBtn);

    // Debug button — toggles event debug overlay for diagnosing input issues
    const debugBtn = document.createElement('button');
    debugBtn.textContent = 'Debug';
    debugBtn.style.opacity = '0.5';
    debugBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    debugBtn.addEventListener('click', () => {
      const overlay = document.getElementById('debug-overlay');
      const showing = overlay.style.display !== 'none';
      overlay.style.display = showing ? 'none' : 'block';
      debugBtn.style.opacity = showing ? '0.5' : '1';
      debugBtn.style.background = showing ? '' : '#c00';
    });
    quickBar.appendChild(debugBtn);
  }

  // --- Viewport / keyboard adjustment ---
  function adjustQuickBarPosition() {
    if (!window.visualViewport) return;
    const vvh = window.visualViewport.height;
    const fullH = window.innerHeight;
    const kbHeight = fullH - vvh - window.visualViewport.offsetTop;
    if (kbHeight > 50) {
      // Keyboard is open — shrink container to fit above keyboard + quick-bar
      quickBar.style.display = 'flex';
      quickBar.style.bottom = kbHeight + 'px';
      const qbH = quickBar.offsetHeight || 44;
      const topbarH = document.getElementById('topbar').offsetHeight || 48;
      const statusH = document.getElementById('status').offsetHeight || 20;
      // Explicit height = viewport minus topbar/status minus quick-bar
      container.style.height = (vvh - topbarH - statusH - qbH) + 'px';
      container.style.flex = 'none';
    } else if (selectMode) {
      // Keyboard closed BUT select mode active — keep quick-bar visible at bottom
      quickBar.style.display = 'flex';
      quickBar.style.bottom = '0';
      const qbH = quickBar.offsetHeight || 44;
      const topbarH = document.getElementById('topbar').offsetHeight || 48;
      const statusH = document.getElementById('status').offsetHeight || 20;
      container.style.height = (vvh - topbarH - statusH - qbH) + 'px';
      container.style.flex = 'none';
    } else {
      // Keyboard is closed — restore flex layout
      quickBar.style.display = 'none';
      container.style.height = '';
      container.style.flex = '1';
    }
    // Re-fit terminal to new container size
    if (fitAddon) fitAddon.fit();
    if (term) wsSend('\x01resize:' + JSON.stringify({ cols: term.cols, rows: term.rows }));
  }

  // --- Reconnection logic ---
  function clearReconnect() {
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    reconnectAttempts = 0;
  }

  function scheduleReconnect() {
    if (intentionalDisconnect || !currentSession) return;
    if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
      setStatus('Reconnect failed (' + MAX_RECONNECT_ATTEMPTS + ' attempts). Tap Refresh.', 'error');
      return;
    }
    // Exponential backoff: 1s, 2s, 4s, ... capped at 30s, with jitter
    const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts), 30000);
    const jitter = Math.random() * 500;
    reconnectAttempts++;
    setStatus('Reconnecting (' + reconnectAttempts + '/' + MAX_RECONNECT_ATTEMPTS + ')...', 'error');
    reconnectTimer = setTimeout(() => {
      if (currentSession && (!ws || ws.readyState === WebSocket.CLOSED)) {
        connectWs(currentSession);
      }
    }, delay + jitter);
  }

  // Establish WebSocket connection (separated for reconnection reuse)
  function connectWs(session) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?session=${encodeURIComponent(session)}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      clearReconnect();
      setStatus('Connected: ' + session, 'connected');
      if (term) {
        ws.send('\x01resize:' + JSON.stringify({ cols: term.cols, rows: term.rows }));
      }
    };

    ws.onmessage = (e) => {
      const data = typeof e.data === 'string' ? e.data : new TextDecoder().decode(e.data);
      if (data.startsWith('\x01voice:')) {
        try { handleVoiceEvent(JSON.parse(data.slice(7))); } catch {}
        return;
      }
      if (data.startsWith('\x01notify:')) {
        try { handleNotifyEvent(JSON.parse(data.slice(8))); } catch {}
        return;
      }
      if (term) term.write(data);
    };

    ws.onclose = () => {
      if (!intentionalDisconnect) {
        setStatus('Disconnected - reconnecting...', 'error');
        scheduleReconnect();
      } else {
        setStatus('Disconnected', 'error');
      }
    };

    ws.onerror = () => {
      // onclose fires after onerror; reconnection handled there
    };

  }

  // Progressively reduce fontSize until term.cols >= 70, down to a minimum of 10.
  // Called after the initial fitAddon.fit() on mobile.
  function optimizeMobileFontSize() {
    const MIN_FONT_SIZE = 10;
    const TARGET_COLS = 70;
    let currentSize = term.options.fontSize;
    while (term.cols < TARGET_COLS && currentSize > MIN_FONT_SIZE) {
      currentSize--;
      term.options.fontSize = currentSize;
      fitAddon.fit();
    }
  }

  function connect(session) {
    unlockAudio(); // Unlock iOS audio on user-gesture (session card tap)
    // Clean up previous connection without returning to picker
    if (ws || term) {
      intentionalDisconnect = true;
      cleanupConnection();
    }
    intentionalDisconnect = false;
    clearReconnect();
    currentSession = session;
    sessionStorage.setItem('currentSession', session);

    // Hide picker, show topbar + terminal + overlay (mobile only)
    picker.style.display = 'none';
    topbar.style.display = 'flex';
    if (isMobile) {
      overlayInput.style.display = 'block';
      buildQuickBar();
    }
    sessionSelect.value = session;

    // Init xterm
    term = new Terminal({
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", monospace',
      theme: { background: '#1a1a2e' },
      cursorBlink: true,
      convertEol: true,
      allowProposedApi: true,
      scrollback: 5000,
      disableStdin: isMobile,  // Mobile uses transparent overlay instead
    });
    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(container);
    fitAddon.fit();
    if (isMobile) optimizeMobileFontSize();

    // Mobile scroll: xterm-viewport handles its own scroll via touch.
    // Bounce prevention is done via CSS overscroll-behavior: none on body.

    // Desktop: terminal keyboard input -> WebSocket (registered once per connect, not per reconnect)
    if (!isMobile) {
      term.onData((data) => { wsSend(data); });
    }

    // Auto-copy: when text is selected (even briefly before tmux clears it),
    // immediately copy to clipboard. Works on both desktop and mobile.
    term.onSelectionChange(() => {
      const sel = term.getSelection();
      if (sel) {
        navigator.clipboard.writeText(sel).catch(() => {});
      }
    });

    // Mobile: touch scroll + tap-to-focus.
    if (isMobile) {
      let _touchStartY = 0;
      let _touchMoved = false;
      const xtermScreen = container.querySelector('.xterm-screen');
      const touchTarget = xtermScreen || container;

      // DEBUG: visible indicator — remove after diagnosis
      const _dbg = document.createElement('div');
      _dbg.style.cssText = 'position:fixed;top:0;left:0;right:0;background:rgba(255,0,0,0.85);color:#fff;font:bold 14px monospace;padding:6px 10px;z-index:99999;pointer-events:none;';
      _dbg.textContent = 'target=' + (xtermScreen ? '.xterm-screen' : 'container') + ' | moves=0 | scrollPos=' + (term.buffer.active.viewportY);
      document.body.appendChild(_dbg);
      let _moveCount = 0;

      // Register on DOCUMENT capture to bypass any element-level blocking
      document.addEventListener('touchstart', (e) => {
        _touchStartY = e.touches[0].clientY;
        _touchMoved = false;
      }, { passive: true, capture: true });
      document.addEventListener('touchmove', (e) => {
        const deltaY = _touchStartY - e.touches[0].clientY;
        if (Math.abs(deltaY) > 5) {
          _touchMoved = true;
          const lines = Math.round(deltaY / 20);
          term.scrollLines(lines);
          _touchStartY = e.touches[0].clientY;
          _moveCount++;
          _dbg.textContent = 'moves=' + _moveCount + ' | delta=' + deltaY.toFixed(0) + ' | lines=' + lines + ' | viewportY=' + term.buffer.active.viewportY + '/' + term.buffer.active.length;
        }
      }, { passive: true, capture: true });
      // Only focus (open keyboard) on tap, not after scroll
      document.addEventListener('touchend', () => {
        // Check if touch was inside terminal area
        if (!_touchMoved && !selectMode) overlayInput.focus();
      }, { capture: true });
    }

    // WebSocket connection
    connectWs(session);

    // Resize handling (clean up old handlers first)
    if (resizeHandler) window.removeEventListener('resize', resizeHandler);
    if (vpResizeHandler) window.visualViewport?.removeEventListener('resize', vpResizeHandler);

    resizeHandler = () => {
      if (fitAddon) fitAddon.fit();
      if (term) wsSend('\x01resize:' + JSON.stringify({ cols: term.cols, rows: term.rows }));
    };
    window.addEventListener('resize', resizeHandler);

    // Mobile: use visualViewport to track keyboard open/close
    if (isMobile && window.visualViewport) {
      vpResizeHandler = () => { adjustQuickBarPosition(); };
      window.visualViewport.addEventListener('resize', vpResizeHandler);
      window.visualViewport.addEventListener('scroll', vpResizeHandler);
    } else {
      vpResizeHandler = resizeHandler;
      window.visualViewport?.addEventListener('resize', vpResizeHandler);
    }
  }

  // Internal cleanup (no UI state changes)
  function cleanupConnection() {
    clearReconnect();
    if (ws) { ws.close(); ws = null; }
    if (term) { term.dispose(); term = null; }
    if (resizeHandler) {
      window.removeEventListener('resize', resizeHandler);
      resizeHandler = null;
    }
    if (vpResizeHandler) {
      window.visualViewport?.removeEventListener('resize', vpResizeHandler);
      window.visualViewport?.removeEventListener('scroll', vpResizeHandler);
      vpResizeHandler = null;
    }
    fitAddon = null;
    selectMode = false;
    // Hide mobile overlay + quick-bar + select overlay, restore flex layout
    hideSelectOverlay();
    overlayInput.style.display = 'none';
    quickBar.style.display = 'none';
    container.style.height = '';
    container.style.flex = '1';
  }

  function disconnect() {
    intentionalDisconnect = true;
    cleanupConnection();
    currentSession = null;
    sessionStorage.removeItem('currentSession');
    topbar.style.display = 'none';
    picker.style.display = 'flex';
    setStatus('');
    loadSessions();
  }

  // --- Mobile input: IME composition + real-time character sending ---
  //
  // Uses transparent overlay textarea on top of xterm. User taps terminal →
  // textarea focuses → keyboard opens. Characters sent immediately to WS.
  //
  // Three-layer event strategy (unchanged from previous input approach):
  //   1. keydown handles keys when e.key is recognized (desktop + iOS)
  //   2. beforeinput handles Backspace/Enter via inputType when keydown misses
  //   3. input handles normal character insertion (non-IME)
  //   4. compositionstart/end handles IME (pinyin, etc.)

  // Special key → terminal escape sequence (hoisted to avoid recreation per keydown)
  const KEY_MAP = {
    'Enter':      '\r',
    'ArrowUp':    '\x1b[A',
    'ArrowDown':  '\x1b[B',
    'ArrowLeft':  '\x1b[D',
    'ArrowRight': '\x1b[C',
    'Tab':        '\t',
    'Escape':     '\x1b',
  };

  let justFinishedComposition = false;
  // Track whether keydown already handled the event this cycle
  let keydownHandled = false;
  // iOS Enter fix: track empty-key keydown timestamp to suppress spurious Backspace
  let _emptyKeyTs = 0;
  // Flag: insertParagraph already handled Enter, suppress trailing insertText
  let _enterParagraphHandled = false;

  // --- Autocomplete duplicate prevention ---
  // Tracks what characters from overlayInput.value have already been sent to the
  // terminal. When an iOS/Android autocomplete suggestion replaces previously typed
  // text (e.g. "th" -> "the"), we detect the mismatch and send backspaces to undo
  // the already-sent chars before sending the replacement word.
  let sentBuffer = '';
  // Timer to periodically reset value + sentBuffer to prevent unbounded growth
  let resetTimer = null;

  function resetSentState() {
    sentBuffer = '';
    overlayInput.value = '';
  }

  // Schedule a deferred reset — if no further input arrives within 800ms,
  // clear both value and sentBuffer. This prevents the textarea value from
  // growing indefinitely during long typing sessions.
  function scheduleReset() {
    if (resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(() => {
      // Only reset if not currently composing
      if (!isComposing) resetSentState();
    }, 800);
  }

  overlayInput.addEventListener('compositionstart', () => {
    isComposing = true;
    // Clear any pending reset — we're in the middle of IME input
    if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
  });

  overlayInput.addEventListener('compositionend', () => {
    isComposing = false;
    justFinishedComposition = true;
    // Send the composed text (e.g. Chinese characters from pinyin IME)
    const text = overlayInput.value;
    if (text) wsSend(text);
    resetSentState();
    // Suppress the trailing `input` event that some browsers fire after compositionend
    requestAnimationFrame(() => { justFinishedComposition = false; });
  });

  // --- Debug logging helper ---
  let _debugSeq = 0;
  function _dbg(event, detail) {
    const log = document.getElementById('debug-log');
    if (!log || document.getElementById('debug-overlay').style.display === 'none') return;
    _debugSeq++;
    const ts = Date.now() % 100000;
    const line = document.createElement('div');
    line.style.borderBottom = '1px solid #333';
    line.style.padding = '1px 0';
    const color = event === 'keydown' ? '#ff0' : event === 'beforeinput' ? '#0ff' : event === 'input' ? '#0f0' : '#f0f';
    line.innerHTML = `<span style="color:#888">${_debugSeq}|${ts}</span> <span style="color:${color}">${event}</span> ${detail}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  // beforeinput: catches mobile soft keyboard actions that keydown misses
  // (when e.key is 'Unidentified'). This fires BEFORE the input value changes.
  overlayInput.addEventListener('beforeinput', (e) => {
    _dbg('beforeinput', `type=<b>${e.inputType}</b> data="${e.data}" kdHandled=${keydownHandled} composing=${isComposing} val="${overlayInput.value}" sent="${sentBuffer}"`);
    if (isComposing) return;
    if (keydownHandled) return;  // keydown already sent this action

    if (e.inputType === 'deleteContentBackward') {
      e.preventDefault();
      wsSend('\x7f');  // DEL
      _dbg('ACTION', '<b style="color:#f00">SEND DEL(\\x7f)</b>');
      // Keep sentBuffer in sync: remove last char
      sentBuffer = sentBuffer.slice(0, -1);
      overlayInput.value = overlayInput.value.slice(0, -1);
    } else if (e.inputType === 'deleteContentForward') {
      e.preventDefault();
      wsSend('\x1b[3~');  // Forward delete escape sequence
      _dbg('ACTION', '<b style="color:#f00">SEND FWD-DEL</b>');
    } else if (e.inputType === 'insertLineBreak' || e.inputType === 'insertParagraph') {
      // Suppress soft keyboard Enter — don't send \r.
      // Terminal Enter is sent exclusively via quick-bar ↵ button.
      // This eliminates the IME confirmation vs terminal Enter ambiguity.
      e.preventDefault();
      resetSentState();
      _dbg('ACTION', '<b style="color:#f80">BLOCKED soft Enter (use ↵ button)</b>');
    }
  });

  overlayInput.addEventListener('input', (e) => {
    _dbg('input', `type=${e.inputType} data="${e.data}" kdHandled=${keydownHandled} composing=${isComposing} justComp=${justFinishedComposition} val="${overlayInput.value}" sent="${sentBuffer}"`);
    if (isComposing) return;
    if (justFinishedComposition) return;
    if (keydownHandled) { keydownHandled = false; return; }

    // Soft keyboard Enter was already blocked in beforeinput.
    // If it leaks through, suppress it here too — terminal Enter is via quick-bar ↵ only.
    if (e.inputType === 'insertParagraph' || e.inputType === 'insertLineBreak') {
      resetSentState();
      return;
    }

    const current = overlayInput.value;

    if (current.startsWith(sentBuffer)) {
      // Normal typing: textarea value grew by appending new chars.
      // Only send the characters we haven't sent yet.
      const newChars = current.slice(sentBuffer.length);
      if (newChars) wsSend(newChars);
      sentBuffer = current;
    } else {
      // Replacement happened (autocomplete suggestion tapped).
      // The keyboard replaced some/all of the typed text with the suggestion.
      // We need to undo what we already sent, then send the replacement.
      //
      // Find the longest common prefix between sentBuffer and current value
      // to minimize the number of backspaces needed.
      let commonLen = 0;
      const minLen = Math.min(sentBuffer.length, current.length);
      while (commonLen < minLen && sentBuffer[commonLen] === current[commonLen]) {
        commonLen++;
      }
      // Delete chars after the common prefix that were already sent
      const charsToDelete = sentBuffer.length - commonLen;
      for (let i = 0; i < charsToDelete; i++) wsSend('\x7f');
      // Send the new chars after the common prefix
      const newPart = current.slice(commonLen);
      if (newPart) wsSend(newPart);
      sentBuffer = current;
    }

    // Don't clear overlayInput.value — we need it to detect future replacements.
    // Instead, schedule a deferred reset to prevent unbounded growth.
    scheduleReset();
  });

  overlayInput.addEventListener('keydown', (e) => {
    const _keyChars = [...e.key].map(c => c.charCodeAt(0));
    _dbg('keydown', `key=<b>"${e.key}"</b> len=${e.key.length} codes=[${_keyChars}] code=${e.code} kc=${e.keyCode} val="${overlayInput.value}" sent="${sentBuffer}"`);
    if (isComposing) return;
    keydownHandled = false;

    // On mobile, many keys fire as 'Unidentified' or keyCode 229.
    // Skip those -- beforeinput will handle them instead.
    // iOS Chinese IME Enter sends key="\n\r" (codes [10,13]) or key=" " before
    // a fake Backspace. Detect: keyCode=229 + key is whitespace/newline only.
    const _isUnidentified = e.key === 'Unidentified' || e.key === 'Process';
    const _isWhitespaceKey = !_isUnidentified && e.keyCode === 229 && /^[\s\n\r]*$/.test(e.key);
    if (_isUnidentified || _isWhitespaceKey) {
      if (_isWhitespaceKey) _emptyKeyTs = Date.now();
      return;
    }

    if (KEY_MAP[e.key]) {
      e.preventDefault();
      wsSend(KEY_MAP[e.key]);
      keydownHandled = true;
      _dbg('ACTION', `<b style="color:#f00">KD SEND KEY_MAP[${e.key}]</b>`);
      // Enter sends \r — reset tracking state since we're starting a new input context
      if (e.key === 'Enter') resetSentState();
      return;
    }

    if (e.key === 'Backspace') {
      // iOS Enter sequence: key="" → Backspace within ~10ms. Suppress fake Backspace.
      if (Date.now() - _emptyKeyTs < 100) { _emptyKeyTs = 0; return; }
      e.preventDefault();
      wsSend('\x7f');
      _dbg('ACTION', '<b style="color:#f00">KD SEND DEL(\\x7f)</b>');
      // Keep sentBuffer in sync with the deletion
      sentBuffer = sentBuffer.slice(0, -1);
      overlayInput.value = overlayInput.value.slice(0, -1);
      keydownHandled = true;
    } else if (e.key === 'Delete') {
      e.preventDefault();
      wsSend('\x1b[3~');
      _dbg('ACTION', '<b style="color:#f00">KD SEND FWD-DEL</b>');
      keydownHandled = true;
    }
  });

  // File upload handler — reads photo, sends base64 to server, auto-types path into terminal
  document.getElementById('file-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const btn = _uploadBtnRef;
    if (btn) btn.textContent = '...';

    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: base64, filename: file.name })
        });
        const result = await res.json();
        if (result.path) {
          wsSend(result.path + ' ');
          if (btn) btn.textContent = 'OK!';
        } else {
          if (btn) btn.textContent = 'Fail';
        }
      } catch {
        if (btn) btn.textContent = 'Fail';
      }
      setTimeout(() => { if (btn) btn.textContent = '\u{1F4F7}'; }, 1500);
      e.target.value = ''; // Reset so same file can be re-selected
    };
    reader.readAsDataURL(file);
  });

  // Switch session from dropdown
  sessionSelect.addEventListener('change', () => {
    connect(sessionSelect.value);
  });

  // Init
  // Request notification permission early so the browser prompt appears on first load
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  loadSessions();
</script>
</body>
</html>
