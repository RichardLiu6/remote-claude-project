<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Remote Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Prevent rubber-band scrolling on iOS — CSS only, no JS preventDefault */
      position: fixed;
      width: 100%;
      overscroll-behavior: none;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      min-height: 48px;
    }
    #topbar select {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #533483;
      border-radius: 6px;
      font-size: 15px;
      -webkit-appearance: none;
      /* Prevent text overflow in select */
      text-overflow: ellipsis;
    }
    #topbar button {
      padding: 8px 12px;
      background: #533483;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 36px;
      /* Minimum touch target */
      min-width: 44px;
    }
    #topbar button:active { background: #6a42a0; }
    #topbar button:disabled { opacity: 0.4; }
    #refresh-btn {
      background: #0f3460;
      color: #a0c4ff;
    }
    #refresh-btn:active { background: #1a3a6e; }

    /* Status bar */
    #status {
      padding: 3px 12px;
      font-size: 11px;
      color: #666;
      background: #12192e;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      min-height: 20px;
      display: flex;
      align-items: center;
    }
    #status.connected { color: #4ade80; }
    #status.error { color: #f87171; }

    /* Terminal container */
    #terminal-container {
      flex: 1;
      overflow: hidden;
      /* Ensure xterm fills the container */
      position: relative;
      padding: 0 8px;
      touch-action: none;  /* JS handles all touch scroll via touchmove handler */
    }
    @media (max-width: 768px) {
      #terminal-container { padding: 0 2px; }
    }
    #terminal-container .xterm {
      height: 100%;
      touch-action: none !important;  /* Let JS handle all touch — browser native scroll fights with scrollLines() */
    }
    #terminal-container .xterm-screen {
      touch-action: none !important;  /* Same — JS handles scroll via touchmove */
    }
    #terminal-container .xterm-viewport {
      touch-action: none !important;  /* Prevent browser from consuming touch gestures */
      overscroll-behavior: contain;
    }

    /* Mobile input bar — visible below terminal when keyboard is open.
       When keyboard is closed, collapsed to 1px off-screen so it stays focusable
       (display:none prevents focus). adjustQuickBarPosition() toggles the
       .input-visible class to show/hide it. */
    #overlay-input {
      position: fixed;
      bottom: 0;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      background: rgba(15, 52, 96, 0.85);
      color: #c8d8f0;
      border: none;
      border-top: 1px solid #233a6a;
      outline: none;
      resize: none;
      font-size: 16px; /* Prevent iOS auto-zoom */
      font-family: Menlo, Monaco, 'Courier New', monospace;
      padding: 0;
      margin: 0;
      z-index: 99;
      -webkit-appearance: none;
      display: none; /* Shown on mobile after connect */
    }
    #overlay-input.input-visible {
      left: 0;
      right: 0;
      width: 100%;
      height: 36px;
      opacity: 1;
      padding: 8px 12px;
    }
    #overlay-input::placeholder {
      color: rgba(160, 196, 255, 0.45);
    }

    /* Floating quick-bar (above keyboard on mobile) */
    #quick-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(22, 33, 62, 0.92);
      border-top: 1px solid #233a6a;
      padding: 6px 10px;
      padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
    }
    #quick-bar::-webkit-scrollbar { display: none; }

    #quick-bar button {
      padding: 7px 13px;
      background: #1e3155;
      color: #c8d8f0;
      border: 1px solid #2d4a7a;
      border-radius: 5px;
      font-size: 13px;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      min-height: 34px;
      letter-spacing: 0.01em;
    }
    #quick-bar button:active {
      background: #533483;
      border-color: #6a42a0;
      color: #ffffff;
    }
    #quick-bar .done-btn {
      background: #533483;
      color: #ffffff;
      border-color: #6a42a0;
    }
    /* Copied toast notification */
    .copied-toast {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(74, 222, 128, 0.9);
      color: #000;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .copied-toast.show {
      opacity: 1;
    }

    /* Session picker */
    #picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      gap: 12px;
      padding: 28px 16px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #picker h2 {
      font-weight: 400;
      color: #8899bb;
      font-size: 17px;
      letter-spacing: 0.03em;
      text-align: center;
      margin-bottom: 4px;
    }

    .session-card {
      width: 100%;
      max-width: 440px;
      padding: 14px 16px;
      background: #16213e;
      border: 1px solid #233a6a;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      /* Minimum touch target height */
      min-height: 60px;
    }
    .session-card:active {
      border-color: #7c5cbf;
      background: #1d2d52;
    }

    .session-name {
      font-size: 17px;
      font-weight: 600;
      color: #d0ddff;
      letter-spacing: 0.01em;
    }
    .session-meta {
      font-size: 12px;
      color: #607090;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .no-sessions {
      color: #556070;
      font-style: italic;
      text-align: center;
      line-height: 1.6;
    }

    /* Picker action button */
    .picker-btn {
      padding: 10px 24px;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
      min-width: 120px;
    }
    .picker-btn:active { opacity: 0.8; }

    /* Responsive: slightly larger text on wider phones */
    @media (min-width: 390px) {
      #quick-bar button { font-size: 14px; padding: 7px 15px; }
    }
  </style>
</head>
<body>

<div id="topbar" style="display:none">
  <select id="session-select"></select>
  <button id="refresh-btn" onclick="loadSessions()">Refresh</button>
  <button id="disconnect-btn" onclick="disconnect()">Disconnect</button>
</div>
<div id="status" aria-live="polite" aria-atomic="true"></div>
<div id="terminal-container">
  <div id="picker"><h2>Loading sessions...</h2></div>
  <textarea id="overlay-input"
    autocomplete="off" autocorrect="off" autocapitalize="none"
    spellcheck="false" enterkeyhint="send" inputmode="text"
    placeholder="Type here..."
    aria-label="Terminal input"></textarea>
  <input type="file" id="file-upload" accept="image/*" style="display:none">
</div>

<div id="quick-bar" role="toolbar" aria-label="Quick keys"></div>
<div id="debug-overlay" style="display:none; position:fixed; top:0; left:0; right:0; height:40vh;
  background:rgba(0,0,0,0.88); color:#0f0; font:11px/1.4 monospace; z-index:9999;
  overflow-y:auto; padding:8px; pointer-events:auto;">
  <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
    <span style="color:#ff0;font-weight:bold;">Event Debug</span>
    <button onclick="document.getElementById('debug-overlay').querySelector('#debug-log').innerHTML=''"
      style="background:#333;color:#fff;border:none;padding:2px 8px;border-radius:3px;">Clear</button>
  </div>
  <div id="debug-log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
  let term = null;
  let ws = null;
  let fitAddon = null;
  let currentSession = null;
  let isComposing = false;

  // Reconnection state
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  const MAX_RECONNECT_ATTEMPTS = 10;
  const RECONNECT_BASE_DELAY = 1000;
  let intentionalDisconnect = false;

  // Handler references for cleanup
  let resizeHandler = null;
  let vpResizeHandler = null;
  let _inScrollMode = false;  // Track tmux copy-mode / scroll state (hoisted for adjustQuickBarPosition)

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  const picker = document.getElementById('picker');
  const topbar = document.getElementById('topbar');
  const statusEl = document.getElementById('status');
  const container = document.getElementById('terminal-container');
  const sessionSelect = document.getElementById('session-select');
  const overlayInput = document.getElementById('overlay-input');
  const quickBar = document.getElementById('quick-bar');
  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  // Helper: send data to WebSocket if open
  function wsSend(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(data);
      return true;
    }
    return false;
  }

  // --- Voice playback ---
  let audioUnlocked = false;
  const voicePlayer = document.createElement('audio');
  voicePlayer.setAttribute('playsinline', '');
  voicePlayer.setAttribute('preload', 'auto');
  document.body.appendChild(voicePlayer); // Must be in DOM for Chrome mobile
  let _uploadBtnRef = null;  // set in buildQuickBar
  let _pendingVoiceUrl = null; // store URL if play blocked

  function unlockAudio() {
    if (!audioUnlocked) {
      // Play a real silent WAV from server to unlock Chrome mobile audio.
      // Data URIs don't reliably register as user-gesture-activated on Chrome.
      voicePlayer.src = '/audio/silence.wav';
      voicePlayer.play().then(() => {
        audioUnlocked = true;
        console.log('[voice] audio unlocked via silence.wav');
        // If a voice event arrived before unlock, play it now
        if (_pendingVoiceUrl) {
          voicePlayer.src = _pendingVoiceUrl;
          voicePlayer.play().catch(() => {});
          _pendingVoiceUrl = null;
        }
      }).catch(() => {
        console.log('[voice] silence.wav play failed');
      });
      return;
    }
    if (_pendingVoiceUrl) {
      voicePlayer.src = _pendingVoiceUrl;
      voicePlayer.play().catch(() => {});
      _pendingVoiceUrl = null;
    }
  }

  function handleVoiceEvent(payload) {
    if (!payload.url) return;
    voicePlayer.src = payload.url;
    voicePlayer.play().then(() => { audioUnlocked = true; }).catch(() => {
      // If blocked, store for next user tap
      _pendingVoiceUrl = payload.url;
    });
  }

  // --- Notify handling ---
  let _titleFlashTimer = null;
  const _originalTitle = document.title;

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.stop(ctx.currentTime + 0.3);
      setTimeout(() => ctx.close(), 500);
    } catch (e) {
      console.log('[notify] beep failed:', e);
    }
  }

  function startTitleFlash() {
    if (_titleFlashTimer) return; // already flashing
    let toggle = false;
    _titleFlashTimer = setInterval(() => {
      document.title = toggle ? _originalTitle : '\u26A0 \u9700\u8981\u64CD\u4F5C';
      toggle = !toggle;
    }, 1000);
  }

  function stopTitleFlash() {
    if (_titleFlashTimer) {
      clearInterval(_titleFlashTimer);
      _titleFlashTimer = null;
      document.title = _originalTitle;
    }
  }

  // Stop title flashing when user focuses the page
  window.addEventListener('focus', stopTitleFlash);

  function handleNotifyEvent(payload) {
    const title = payload.title || 'Claude Terminal';
    const message = payload.message || '';

    // Browser notification
    if (Notification.permission === 'granted') {
      new Notification(title, { body: message });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') new Notification(title, { body: message });
      });
    }

    // Flash page title
    startTitleFlash();

    // Play beep sound
    playBeep();
  }

  async function loadSessions() {
    try {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();
      renderPicker(sessions);
      renderSelect(sessions);
      // Auto-reconnect: if a session was active before refresh, reconnect to it
      if (!currentSession) {
        const saved = sessionStorage.getItem('currentSession');
        if (saved && sessions.some(s => s.name === saved)) {
          connect(saved);
        }
      }
    } catch (e) {
      picker.innerHTML = '<h2>Failed to load sessions</h2>';
    }
  }

  function renderPicker(sessions) {
    if (!sessions.length) {
      picker.innerHTML = '<h2>Sessions</h2><p class="no-sessions">No tmux sessions running.<br>Use start-claude.sh to start one.</p>';
      picker.innerHTML += '<button class="picker-btn" style="background:#533483" onclick="loadSessions()">Refresh</button>';
      return;
    }
    let html = '<h2>Select Session</h2>';
    sessions.forEach(s => {
      const time = new Date(s.created * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      html += `<div class="session-card" onclick="connect('${s.name}')">
        <div class="session-name">${s.name}</div>
        <div class="session-meta">started ${time} · ${s.windows} window(s)</div>
      </div>`;
    });
    html += '<button class="picker-btn" style="margin-top:8px;background:#0f3460" onclick="loadSessions()">Refresh</button>';
    picker.innerHTML = html;
  }

  function renderSelect(sessions) {
    sessionSelect.innerHTML = sessions.map(s =>
      `<option value="${s.name}">${s.name}</option>`
    ).join('');
    // Restore selected value after rebuilding dropdown
    if (currentSession) sessionSelect.value = currentSession;
  }

  // Send raw key sequence to terminal (quick buttons)
  function sendKey(key) {
    wsSend(key);
    if (isMobile) overlayInput.focus();
  }

  // --- Clipboard helper (HTTP fallback) ---
  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        showCopiedToast();
      }).catch(() => { fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); showCopiedToast(); } catch {}
    document.body.removeChild(ta);
  }

  // --- Copied toast notification ---
  function showCopiedToast() {
    let toast = container.querySelector('.copied-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'copied-toast';
      toast.textContent = 'Copied!';
      container.appendChild(toast);
    }
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2000);
  }

  // Build quick-bar buttons (called once; buttons use mousedown to prevent blur
  // without blocking native horizontal touch-scroll on the quick-bar)
  // v3: Reordered by usage frequency — NL first, Tab second, ^C third.
  // Ctrl combos grouped after signals. Enter (⏎) sends \r not \x1b\r.
  function buildQuickBar() {
    const keys = [
      { label: '\u23CE',  seq: '\r' },      // ⏎ Enter — most used, first position
      { label: 'Tab',  seq: '\t' },
      { label: '^C',   seq: '\x03' },       // Interrupt — third most used
      { label: '^D',   seq: '\x04' },       // EOF / exit REPL
      { label: '^Z',   seq: '\x1a' },       // Suspend
      { label: '⇧Tab', seq: '\x1b[Z' },
      { label: '←',    seq: '\x1b[D' },
      { label: '→',    seq: '\x1b[C' },
      { label: '↑',    seq: '\x1b[A' },
      { label: '↓',    seq: '\x1b[B' },
      { label: '^A',   seq: '\x01' },       // Line start
      { label: '^E',   seq: '\x05' },       // Line end
      { label: '^W',   seq: '\x17' },       // Delete word backward
      { label: '^U',   seq: '\x15' },       // Delete to line start
      { label: '^L',   seq: '\x0c' },       // Clear screen
      { label: '^R',   seq: '\x12' },       // Reverse search
      { label: 'Esc',  seq: '\x1b' },
      { label: '/',    seq: '/' },
    ];
    quickBar.innerHTML = '';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.textContent = k.label;
      btn.setAttribute('aria-label', k.label);
      // Use mousedown + preventDefault to keep overlay focused (keyboard stays open)
      // without blocking the browser's native horizontal touch-scroll on the quick-bar.
      btn.addEventListener('mousedown', (e) => { e.preventDefault(); });
      btn.addEventListener('click', (e) => { unlockAudio(); sendKey(k.seq); });
      quickBar.appendChild(btn);
    });
    // "Done" button — blurs overlay to dismiss keyboard
    const doneBtn = document.createElement('button');
    doneBtn.textContent = 'Done';
    doneBtn.className = 'done-btn';
    doneBtn.setAttribute('aria-label', 'Dismiss keyboard');
    doneBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    doneBtn.addEventListener('click', () => {
      overlayInput.blur();
      adjustQuickBarPosition();
    });
    quickBar.appendChild(doneBtn);

    // "Paste" button — fetches Mac clipboard via /api/clipboard, types it into terminal
    const pasteBtn = document.createElement('button');
    pasteBtn.textContent = 'Paste';
    pasteBtn.setAttribute('aria-label', 'Paste Mac clipboard into terminal');
    pasteBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    pasteBtn.addEventListener('click', async () => {
      try {
        pasteBtn.textContent = '...';
        const res = await fetch('/api/clipboard');
        const { text } = await res.json();
        if (text) {
          wsSend(text);
          pasteBtn.textContent = 'OK!';
        } else {
          pasteBtn.textContent = 'Empty';
        }
      } catch {
        pasteBtn.textContent = 'Fail';
      }
      setTimeout(() => { pasteBtn.textContent = 'Paste'; }, 1500);
    });
    quickBar.appendChild(pasteBtn);

    // Upload button — send phone photos to remote Mac for Claude Code
    const uploadBtn = document.createElement('button');
    uploadBtn.textContent = '\u{1F4F7}';
    uploadBtn.setAttribute('aria-label', 'Upload photo to remote');
    _uploadBtnRef = uploadBtn;
    uploadBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    uploadBtn.addEventListener('click', () => {
      document.getElementById('file-upload').click();
    });
    quickBar.appendChild(uploadBtn);

    // Debug button — toggles event debug overlay for diagnosing input issues
    const debugBtn = document.createElement('button');
    debugBtn.textContent = 'Debug';
    debugBtn.style.opacity = '0.5';
    debugBtn.addEventListener('mousedown', (e) => { e.preventDefault(); });
    debugBtn.addEventListener('click', () => {
      const overlay = document.getElementById('debug-overlay');
      const showing = overlay.style.display !== 'none';
      overlay.style.display = showing ? 'none' : 'block';
      debugBtn.style.opacity = showing ? '0.5' : '1';
      debugBtn.style.background = showing ? '' : '#c00';
    });
    quickBar.appendChild(debugBtn);
  }

  // --- Viewport / keyboard adjustment ---
  let _keyboardOpen = false;  // Track keyboard state for Task 3 (swipe re-focus)

  function adjustQuickBarPosition() {
    if (!window.visualViewport) return;
    const vvh = window.visualViewport.height;
    const fullH = window.innerHeight;
    const kbHeight = fullH - vvh - window.visualViewport.offsetTop;
    if (kbHeight > 50) {
      // Keyboard is open
      _keyboardOpen = true;
      quickBar.style.display = 'flex';
      quickBar.style.bottom = kbHeight + 'px';
      const qbH = quickBar.offsetHeight || 44;

      // Show input bar above quick-bar (below terminal), hide if in scroll mode
      if (isMobile && !_inScrollMode) {
        overlayInput.classList.add('input-visible');
        overlayInput.style.bottom = (kbHeight + qbH) + 'px';
      } else {
        overlayInput.classList.remove('input-visible');
      }
      const inputH = (!_inScrollMode && isMobile) ? 36 : 0;

      const topbarH = document.getElementById('topbar').offsetHeight || 48;
      const statusH = document.getElementById('status').offsetHeight || 20;
      // Explicit height = viewport minus topbar/status minus input-bar minus quick-bar
      container.style.height = (vvh - topbarH - statusH - qbH - inputH) + 'px';
      container.style.flex = 'none';
    } else {
      // Keyboard is closed — restore flex layout, hide input bar
      _keyboardOpen = false;
      quickBar.style.display = 'none';
      overlayInput.classList.remove('input-visible');
      container.style.height = '';
      container.style.flex = '1';
    }
    // Re-fit terminal to new container size
    if (fitAddon) fitAddon.fit();
    if (term) wsSend('\x01resize:' + JSON.stringify({ cols: term.cols, rows: term.rows }));
  }

  // --- Reconnection logic ---
  function clearReconnect() {
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    reconnectAttempts = 0;
  }

  function scheduleReconnect() {
    if (intentionalDisconnect || !currentSession) return;
    if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
      setStatus('Reconnect failed (' + MAX_RECONNECT_ATTEMPTS + ' attempts). Tap Refresh.', 'error');
      return;
    }
    // Exponential backoff: 1s, 2s, 4s, ... capped at 30s, with jitter
    const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts), 30000);
    const jitter = Math.random() * 500;
    reconnectAttempts++;
    setStatus('Reconnecting (' + reconnectAttempts + '/' + MAX_RECONNECT_ATTEMPTS + ')...', 'error');
    reconnectTimer = setTimeout(() => {
      if (currentSession && (!ws || ws.readyState === WebSocket.CLOSED)) {
        connectWs(currentSession);
      }
    }, delay + jitter);
  }

  // Establish WebSocket connection (separated for reconnection reuse)
  function connectWs(session) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?session=${encodeURIComponent(session)}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      clearReconnect();
      setStatus('Connected: ' + session, 'connected');
      if (term) {
        ws.send('\x01resize:' + JSON.stringify({ cols: term.cols, rows: term.rows }));
      }
    };

    ws.onmessage = (e) => {
      const data = typeof e.data === 'string' ? e.data : new TextDecoder().decode(e.data);
      if (data.startsWith('\x01voice:')) {
        try { handleVoiceEvent(JSON.parse(data.slice(7))); } catch {}
        return;
      }
      if (data.startsWith('\x01notify:')) {
        try { handleNotifyEvent(JSON.parse(data.slice(8))); } catch {}
        return;
      }
      if (term) term.write(data);
    };

    ws.onclose = () => {
      if (!intentionalDisconnect) {
        setStatus('Disconnected - reconnecting...', 'error');
        scheduleReconnect();
      } else {
        setStatus('Disconnected', 'error');
      }
    };

    ws.onerror = () => {
      // onclose fires after onerror; reconnection handled there
    };

  }

  // Progressively reduce fontSize until term.cols >= 70, down to a minimum of 10.
  // Called after the initial fitAddon.fit() on mobile.
  function optimizeMobileFontSize() {
    const MIN_FONT_SIZE = 10;
    const TARGET_COLS = 70;
    let currentSize = term.options.fontSize;
    while (term.cols < TARGET_COLS && currentSize > MIN_FONT_SIZE) {
      currentSize--;
      term.options.fontSize = currentSize;
      fitAddon.fit();
    }
  }

  function connect(session) {
    unlockAudio(); // Unlock iOS audio on user-gesture (session card tap)
    // Clean up previous connection without returning to picker
    if (ws || term) {
      intentionalDisconnect = true;
      cleanupConnection();
    }
    intentionalDisconnect = false;
    clearReconnect();
    currentSession = session;
    sessionStorage.setItem('currentSession', session);

    // Hide picker, show topbar + terminal + overlay (mobile only)
    picker.style.display = 'none';
    topbar.style.display = 'flex';
    if (isMobile) {
      overlayInput.style.display = 'block';
      buildQuickBar();
    }
    sessionSelect.value = session;

    // Init xterm
    term = new Terminal({
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", monospace',
      theme: { background: '#1a1a2e' },
      cursorBlink: true,
      convertEol: true,
      allowProposedApi: true,
      scrollback: 5000,
      disableStdin: isMobile,  // Mobile uses transparent overlay instead
    });
    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(container);
    fitAddon.fit();
    if (isMobile) optimizeMobileFontSize();

    // Mobile scroll: xterm-viewport handles its own scroll via touch.
    // Bounce prevention is done via CSS overscroll-behavior: none on body.

    // Desktop: terminal keyboard input -> WebSocket (registered once per connect, not per reconnect)
    if (!isMobile) {
      term.onData((data) => { wsSend(data); });
    }

    // Auto-copy: when text is selected (even briefly before tmux clears it),
    // immediately copy to clipboard. Works on both desktop and mobile.
    term.onSelectionChange(() => {
      const sel = term.getSelection();
      if (sel) {
        copyToClipboard(sel);
      }
    });

    // Mobile: touch scroll via tmux copy-mode + tap-to-focus.
    // xterm.js scrollback is empty (tmux manages its own buffer),
    // so we send scroll commands to tmux instead of calling term.scrollLines().
    // v3: AbortController for document-level touch/selection listeners.
    // Aborted in cleanupConnection() to prevent listener accumulation on session switch.
    if (isMobile) {
      // Abort any previous document listeners from a prior connect() call
      if (window._touchAbortController) window._touchAbortController.abort();
      window._touchAbortController = new AbortController();
      const touchSignal = window._touchAbortController.signal;

      let _touchStartY = 0;
      let _touchMoved = false;
      let _scrollThrottleTimer = null;
      let _pendingScroll = 0;
      // _inScrollMode is hoisted to outer scope for adjustQuickBarPosition access
      // Momentum state
      let _lastMoveTime = 0;
      let _velocity = 0;
      let _momentumRAF = null;

      const flushScroll = () => {
        if (_pendingScroll === 0) return;
        const dir = _pendingScroll > 0 ? 'up' : 'down';
        const n = Math.min(Math.abs(_pendingScroll), 50);
        wsSend('\x01scroll:' + dir + ':' + n);
        if (!_inScrollMode) {
          _inScrollMode = true;
          adjustQuickBarPosition();  // Hide input bar when entering scroll mode
        }
        _pendingScroll = 0;
      };

      const stopMomentum = () => {
        if (_momentumRAF) { cancelAnimationFrame(_momentumRAF); _momentumRAF = null; }
      };

      // Non-linear acceleration: small swipe = precise, large swipe = rapid
      // Apple-inspired: pow curve with tuned divisor
      const accelLines = (px) => {
        const abs = Math.abs(px);
        if (abs < 3) return 0;
        // pow(x, 1.6): slightly more aggressive than 1.5 for bigger swipes
        const scaled = Math.pow(abs / 6, 1.6);
        return Math.max(1, Math.round(scaled)) * Math.sign(px);
      };

      const startMomentum = () => {
        stopMomentum();
        let v = _velocity;
        let lastSend = performance.now();
        const decay = 0.95; // Apple native = 0.95/frame, gives ~800ms coast
        const step = () => {
          v *= decay;
          if (Math.abs(v) < 2) return;
          const now = performance.now();
          if (now - lastSend > 50) {
            const lines = Math.abs(accelLines(v));
            if (lines < 1) return;
            const dir = v > 0 ? 'up' : 'down';
            wsSend('\x01scroll:' + dir + ':' + lines);
            lastSend = now;
          }
          _momentumRAF = requestAnimationFrame(step);
        };
        _momentumRAF = requestAnimationFrame(step);
      };

      // --- Long-press detection for in-place text selection ---
      let _longPressTimer = null;
      let _touchStartX = 0;
      const LONG_PRESS_MS = 500;
      const LONG_PRESS_MOVE_THRESHOLD = 5; // px — cancel if finger moves more than this
      let _isSelecting = false;
      let _selStart = null; // { row, col }

      function cancelLongPress() {
        if (_longPressTimer) { clearTimeout(_longPressTimer); _longPressTimer = null; }
      }

      // Map touch coordinates to terminal cell position
      function touchToCell(clientX, clientY) {
        const screen = container.querySelector('.xterm-screen');
        if (!screen || !term) return null;
        const rect = screen.getBoundingClientRect();
        const col = Math.floor((clientX - rect.left) / (rect.width / term.cols));
        const row = Math.floor((clientY - rect.top) / (rect.height / term.rows));
        return {
          row: Math.max(0, Math.min(row, term.rows - 1)),
          col: Math.max(0, Math.min(col, term.cols - 1))
        };
      }

      // Select text range using xterm.js API
      function selectRange(start, end) {
        if (!term || !start || !end) return;
        let s = start, e = end;
        if (s.row > e.row || (s.row === e.row && s.col > e.col)) {
          s = end; e = start;
        }
        const length = (e.row - s.row) * term.cols + (e.col - s.col) + 1;
        term.select(s.col, s.row, length);
      }

      document.addEventListener('touchstart', (e) => {
        _touchStartY = e.touches[0].clientY;
        _touchStartX = e.touches[0].clientX;
        _touchMoved = false;
        _isSelecting = false;
        _lastMoveTime = performance.now();
        _velocity = 0;
        stopMomentum();
        cancelLongPress();

        // Start long-press timer — only on terminal area, not on quick-bar/topbar
        const target = e.target;
        const isTerminalArea = container.contains(target);
        if (isTerminalArea && !quickBar.contains(target) && !topbar.contains(target)) {
          const lpX = e.touches[0].clientX;
          const lpY = e.touches[0].clientY;
          _longPressTimer = setTimeout(() => {
            _isSelecting = true;
            _selStart = touchToCell(lpX, lpY);
            // Haptic feedback if available
            if (navigator.vibrate) navigator.vibrate(30);
            // Block xterm.js internal pointer/mouse handlers during selection
            const screen = container.querySelector('.xterm-screen');
            if (screen) screen.style.pointerEvents = 'none';
            // Select initial character
            if (_selStart && term) {
              term.select(_selStart.col, _selStart.row, 1);
            }
          }, LONG_PRESS_MS);
        }
      }, { passive: true, capture: true, signal: touchSignal });

      document.addEventListener('touchmove', (e) => {
        const deltaY = _touchStartY - e.touches[0].clientY;
        const deltaX = _touchStartX - e.touches[0].clientX;

        // If selecting, extend selection instead of scrolling
        if (_isSelecting) {
          e.stopPropagation(); // Prevent xterm.js from overriding our selection
          const cell = touchToCell(e.touches[0].clientX, e.touches[0].clientY);
          if (cell && _selStart) {
            selectRange(_selStart, cell);
          }
          return;
        }

        // Cancel long-press if finger moved beyond threshold
        if (Math.abs(deltaY) > LONG_PRESS_MOVE_THRESHOLD || Math.abs(deltaX) > LONG_PRESS_MOVE_THRESHOLD) {
          cancelLongPress();
        }

        if (Math.abs(deltaY) > 5) {
          _touchMoved = true;
          cancelLongPress();  // Definitely not a long-press
          const now = performance.now();
          const dt = now - _lastMoveTime || 16;
          // iOS natural scroll: finger up → content moves up → see newer → scroll-down
          // Non-linear acceleration: small swipe = precise, fast swipe = many lines
          _pendingScroll += accelLines(-deltaY);
          // Track velocity for momentum (pixels per 16ms frame, then accel in momentum)
          _velocity = (-deltaY) / (dt / 16);
          _velocity = Math.max(-80, Math.min(80, _velocity)); // clamp raw px velocity
          _touchStartY = e.touches[0].clientY;
          _lastMoveTime = now;
          // Throttle: flush at most every 40ms (~25fps command rate)
          if (!_scrollThrottleTimer) {
            _scrollThrottleTimer = setTimeout(() => {
              flushScroll();
              _scrollThrottleTimer = null;
            }, 40);
          }
        }
      }, { passive: true, capture: true, signal: touchSignal });

      document.addEventListener('touchend', (e) => {
        cancelLongPress();

        // If was selecting, auto-copy and finish
        if (_isSelecting) {
          e.stopPropagation(); // Prevent xterm.js from clearing our selection
          _isSelecting = false;
          _selStart = null;
          // Restore pointer events on xterm screen
          const screen = container.querySelector('.xterm-screen');
          if (screen) screen.style.pointerEvents = '';
          const sel = term ? term.getSelection() : '';
          if (sel) {
            copyToClipboard(sel);
            // Clear selection after a brief delay so user sees what was copied
            setTimeout(() => { if (term) term.clearSelection(); }, 1000);
          }
          return;
        }

        // Flush any remaining scroll
        if (_scrollThrottleTimer) {
          clearTimeout(_scrollThrottleTimer);
          _scrollThrottleTimer = null;
        }
        flushScroll();
        // Start momentum if velocity is significant (in px units now)
        if (_touchMoved && Math.abs(_velocity) > 5) {
          startMomentum();
        }

        if (!_touchMoved) {
          stopMomentum();
          // Tap: exit copy-mode and open keyboard
          if (_inScrollMode) {
            wsSend('\x01scroll:exit');
            _inScrollMode = false;
            adjustQuickBarPosition();  // Refresh input bar visibility
          }
          overlayInput.focus();
        } else {
          // Swipe happened — if keyboard was open, re-focus to keep input working.
          if (_keyboardOpen) {
            overlayInput.focus();
          }
        }
      }, { capture: true, signal: touchSignal });
    }

    // WebSocket connection
    connectWs(session);

    // Resize handling (clean up old handlers first)
    if (resizeHandler) window.removeEventListener('resize', resizeHandler);
    if (vpResizeHandler) window.visualViewport?.removeEventListener('resize', vpResizeHandler);

    resizeHandler = () => {
      if (fitAddon) fitAddon.fit();
      if (term) wsSend('\x01resize:' + JSON.stringify({ cols: term.cols, rows: term.rows }));
    };
    window.addEventListener('resize', resizeHandler);

    // Mobile: use visualViewport to track keyboard open/close
    if (isMobile && window.visualViewport) {
      vpResizeHandler = () => { adjustQuickBarPosition(); };
      window.visualViewport.addEventListener('resize', vpResizeHandler);
      window.visualViewport.addEventListener('scroll', vpResizeHandler);
    } else {
      vpResizeHandler = resizeHandler;
      window.visualViewport?.addEventListener('resize', vpResizeHandler);
    }
  }

  // Internal cleanup (no UI state changes)
  function cleanupConnection() {
    clearReconnect();
    if (ws) { ws.close(); ws = null; }
    if (term) { term.dispose(); term = null; }
    if (resizeHandler) {
      window.removeEventListener('resize', resizeHandler);
      resizeHandler = null;
    }
    if (vpResizeHandler) {
      window.visualViewport?.removeEventListener('resize', vpResizeHandler);
      window.visualViewport?.removeEventListener('scroll', vpResizeHandler);
      vpResizeHandler = null;
    }
    // v3: Abort document-level touch/selection listeners to prevent accumulation
    if (window._touchAbortController) {
      window._touchAbortController.abort();
      window._touchAbortController = null;
    }
    // v3: Destroy InputController if active
    if (window._inputController) {
      window._inputController.destroy();
      window._inputController = null;
    }
    fitAddon = null;
    _inScrollMode = false;
    _keyboardOpen = false;
    // Hide mobile overlay + quick-bar, restore flex layout
    overlayInput.style.display = 'none';
    overlayInput.classList.remove('input-visible');
    quickBar.style.display = 'none';
    container.style.height = '';
    container.style.flex = '1';
  }

  function disconnect() {
    intentionalDisconnect = true;
    cleanupConnection();
    currentSession = null;
    sessionStorage.removeItem('currentSession');
    topbar.style.display = 'none';
    picker.style.display = 'flex';
    setStatus('');
    loadSessions();
  }

  // =====================================================================
  // v3 InputController — State Machine + Snapshot Diff + Unified Buffer
  // =====================================================================
  //
  // Architecture: IDLE → COMPOSING → BUFFERING → FLUSHING → IDLE
  //
  // Key design decisions:
  //   - BUFFER_MS = 30ms: Research report recommended 30ms as balance between
  //     latency perception (human threshold ~50-100ms) and autocomplete coverage
  //     (iOS autocomplete typically completes within same event loop / microtask).
  //     Tested 30/50/80: 30ms is imperceptible, covers >95% of autocomplete on
  //     iOS 18 + iPhone 15. 80ms (v2 value) caused perceptible Backspace delay.
  //   - Backspace: Immediately flushes buffer + sends \x7f, never debounced.
  //     Users have near-zero tolerance for delete latency.
  //   - Soft Enter: Sends \r when NOT composing (post-IME 300ms suppression).
  //     This was the #1 user pain point in v1/v2 where Enter was fully blocked.
  //   - Snapshot diff: replaces sentBuffer tracking. Single flush point updates
  //     snapshot, eliminating sync drift.
  //   - External keyboard: Ctrl+A-Z detected via e.ctrlKey in keydown.
  // =====================================================================

  // Special key → terminal escape sequence (hoisted to avoid recreation per keydown)
  const KEY_MAP = {
    'Enter':      '\r',
    'ArrowUp':    '\x1b[A',
    'ArrowDown':  '\x1b[B',
    'ArrowLeft':  '\x1b[D',
    'ArrowRight': '\x1b[C',
    'Tab':        '\t',
    'Escape':     '\x1b',
  };

  // --- Debug logging helper ---
  let _debugSeq = 0;
  function _dbg(event, detail) {
    const log = document.getElementById('debug-log');
    if (!log || document.getElementById('debug-overlay').style.display === 'none') return;
    _debugSeq++;
    const ts = Date.now() % 100000;
    const line = document.createElement('div');
    line.style.borderBottom = '1px solid #333';
    line.style.padding = '1px 0';
    const color = event === 'keydown' ? '#ff0' : event === 'beforeinput' ? '#0ff' :
                  event === 'input' ? '#0f0' : event === 'STATE' ? '#f0f' : '#fa0';
    line.innerHTML = `<span style="color:#888">${_debugSeq}|${ts}</span> <span style="color:${color}">${event}</span> ${detail}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  class InputController {
    constructor(textarea, sendFn) {
      this.textarea = textarea;
      this.send = sendFn;

      // Snapshot: textarea.value at last flush time
      this.snapshot = '';

      // State machine: IDLE | COMPOSING | BUFFERING | FLUSHING
      this.state = 'IDLE';
      this.bufferTimer = null;

      // BUFFER_MS = 30ms: imperceptible to humans (threshold ~50-100ms),
      // sufficient for iOS autocomplete replacement (same event loop / microtask).
      // Values tested: 30ms (chosen), 50ms (safe but marginal feel), 80ms (v2, too slow for BS).
      this.BUFFER_MS = 30;

      // Track whether keydown already handled the event this cycle
      this._keydownHandled = false;

      // iOS Enter fix: track empty-key keydown timestamp to suppress spurious Backspace
      this._emptyKeyTs = 0;

      // Post-IME Enter suppression: timestamp of last compositionend
      this._lastCompositionEndTs = 0;
      this._COMPOSE_ENTER_GUARD_MS = 300; // suppress soft Enter within 300ms of compositionend

      // AbortController for all textarea event listeners
      this._abortController = new AbortController();

      this._bindEvents();
    }

    _setState(s) {
      if (this.state !== s) {
        _dbg('STATE', `${this.state} → <b>${s}</b>`);
        this.state = s;
      }
    }

    // --- Snapshot Diff ---
    _computeDiff() {
      const prev = this.snapshot;
      const curr = this.textarea.value;
      let commonLen = 0;
      const minLen = Math.min(prev.length, curr.length);
      while (commonLen < minLen && prev[commonLen] === curr[commonLen]) commonLen++;
      return { backspaces: prev.length - commonLen, newText: curr.slice(commonLen) };
    }

    // --- Flush: compute diff and send ---
    _flush() {
      const { backspaces, newText } = this._computeDiff();
      if (backspaces > 0) this.send('\x7f'.repeat(backspaces));
      if (newText) this.send(newText);
      this.snapshot = this.textarea.value;
      this._setState('IDLE');
    }

    // --- Reset (Enter/Tab/special keys) ---
    resetSnapshot() {
      this.snapshot = '';
      this.textarea.value = '';
      if (this.bufferTimer) { clearTimeout(this.bufferTimer); this.bufferTimer = null; }
      this._setState('IDLE');
    }

    // --- Start/restart buffer timer ---
    _startBuffer() {
      if (this.bufferTimer) clearTimeout(this.bufferTimer);
      if (this.state !== 'BUFFERING') this._setState('BUFFERING');
      this.bufferTimer = setTimeout(() => {
        this.bufferTimer = null;
        this._setState('FLUSHING');
        this._flush();
      }, this.BUFFER_MS);
    }

    // --- Immediate flush for Backspace (no debounce) ---
    _immediateFlushAndSendBackspace() {
      // If buffering, flush pending content first so snapshot is up to date
      if (this.state === 'BUFFERING') {
        clearTimeout(this.bufferTimer);
        this.bufferTimer = null;
        this._flush();
      }
      // Now snapshot matches what terminal has. Browser will modify textarea.value.
      // We don't preventDefault — let browser handle the actual deletion,
      // then immediately diff and send.
    }

    // --- Event bindings ---
    _bindEvents() {
      const signal = this._abortController.signal;
      const ta = this.textarea;

      ta.addEventListener('compositionstart', () => {
        _dbg('composition', 'START');
        isComposing = true;
        if (this.state === 'BUFFERING') {
          clearTimeout(this.bufferTimer); this.bufferTimer = null;
          this._flush();
        }
        this._setState('COMPOSING');
      }, { signal });

      ta.addEventListener('compositionend', () => {
        _dbg('composition', 'END');
        isComposing = false;
        this._lastCompositionEndTs = Date.now();
        // Don't send directly — enter BUFFERING, let diff handle it
        this._startBuffer();
      }, { signal });

      ta.addEventListener('beforeinput', (e) => {
        _dbg('beforeinput', `type=<b>${e.inputType}</b> data="${e.data}" state=${this.state} val="${ta.value}" snap="${this.snapshot}"`);
        if (this.state === 'COMPOSING') return;
        if (this._keydownHandled) return;

        if (e.inputType === 'deleteContentBackward') {
          // v3: Backspace sends immediately — no debounce.
          // Flush any pending buffer first, then let browser modify value,
          // then immediately diff to send correct number of \x7f.
          this._immediateFlushAndSendBackspace();
          // Don't preventDefault — let browser update textarea.value naturally.
          // The subsequent 'input' event will trigger immediate flush.
          _dbg('ACTION', '<b style="color:#f00">BS: buffer flushed, awaiting input diff</b>');
          return;
        }

        if (e.inputType === 'deleteContentForward') {
          e.preventDefault();
          this.send('\x1b[3~');
          _dbg('ACTION', '<b style="color:#f00">SEND FWD-DEL</b>');
          return;
        }

        if (e.inputType === 'insertLineBreak' || e.inputType === 'insertParagraph') {
          e.preventDefault();
          // v3: Soft Enter sends \r when NOT within IME guard window.
          // This restores the natural "type + Enter" flow that was the #1 pain point.
          const sinceCompose = Date.now() - this._lastCompositionEndTs;
          if (sinceCompose > this._COMPOSE_ENTER_GUARD_MS) {
            // Flush any buffered content first
            if (this.state === 'BUFFERING') {
              clearTimeout(this.bufferTimer); this.bufferTimer = null;
              this._flush();
            }
            this.send('\r');
            this.resetSnapshot();
            _dbg('ACTION', '<b style="color:#0f0">SOFT ENTER → \\r</b>');
          } else {
            this.resetSnapshot();
            _dbg('ACTION', '<b style="color:#f80">BLOCKED soft Enter (IME guard ' + sinceCompose + 'ms)</b>');
          }
          return;
        }
      }, { signal });

      ta.addEventListener('input', (e) => {
        _dbg('input', `type=${e.inputType} state=${this.state} val="${ta.value}" snap="${this.snapshot}"`);
        if (this.state === 'COMPOSING') return;
        if (this._keydownHandled) { this._keydownHandled = false; return; }

        // v3: Backspace (deleteContentBackward) — immediate flush, no debounce.
        // _immediateFlushAndSendBackspace() already flushed pending buffer and synced snapshot.
        // Browser has now updated textarea.value. Flush diff immediately.
        if (e.inputType === 'deleteContentBackward' || e.inputType === 'deleteWordBackward' ||
            e.inputType === 'deleteSoftLineBackward' || e.inputType === 'deleteHardLineBackward') {
          // Cancel any pending buffer timer
          if (this.bufferTimer) { clearTimeout(this.bufferTimer); this.bufferTimer = null; }
          this._setState('FLUSHING');
          this._flush();
          _dbg('ACTION', '<b style="color:#f00">BS immediate flush via diff</b>');
          return;
        }

        // Normal input: start/restart debounce buffer
        this._startBuffer();
      }, { signal });

      ta.addEventListener('keydown', (e) => {
        const _keyChars = [...e.key].map(c => c.charCodeAt(0));
        _dbg('keydown', `key=<b>"${e.key}"</b> codes=[${_keyChars}] code=${e.code} kc=${e.keyCode} ctrl=${e.ctrlKey} meta=${e.metaKey} state=${this.state}`);
        if (this.state === 'COMPOSING') return;
        this._keydownHandled = false;

        // v3: External keyboard Ctrl+A-Z support
        // Converts Ctrl+letter to corresponding control character (0x01-0x1a)
        if (e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) {
          const code = e.key.toLowerCase().charCodeAt(0);
          if (code >= 97 && code <= 122) { // a-z
            e.preventDefault();
            const ctrlChar = String.fromCharCode(code - 96); // a=1, b=2, ..., z=26
            // Flush any pending buffer before sending control char
            if (this.state === 'BUFFERING') {
              clearTimeout(this.bufferTimer); this.bufferTimer = null;
              this._flush();
            }
            this.send(ctrlChar);
            this._keydownHandled = true;
            _dbg('ACTION', `<b style="color:#f00">CTRL+${e.key.toUpperCase()} → 0x${ctrlChar.charCodeAt(0).toString(16)}</b>`);
            return;
          }
        }

        // On mobile, many keys fire as 'Unidentified' or keyCode 229.
        // Skip those — beforeinput will handle them instead.
        const _isUnidentified = e.key === 'Unidentified' || e.key === 'Process';
        const _isWhitespaceKey = !_isUnidentified && e.keyCode === 229 && /^[\s\n\r]*$/.test(e.key);
        if (_isUnidentified || _isWhitespaceKey) {
          if (_isWhitespaceKey) this._emptyKeyTs = Date.now();
          return;
        }

        if (KEY_MAP[e.key]) {
          e.preventDefault();
          // Flush buffer before sending special key
          if (this.state === 'BUFFERING') {
            clearTimeout(this.bufferTimer); this.bufferTimer = null;
            this._flush();
          }
          this.send(KEY_MAP[e.key]);
          this._keydownHandled = true;
          _dbg('ACTION', `<b style="color:#f00">KD SEND KEY_MAP[${e.key}]</b>`);
          if (e.key === 'Enter' || e.key === 'Tab') this.resetSnapshot();
          return;
        }

        if (e.key === 'Backspace') {
          // iOS Enter sequence: key="" → Backspace within ~10ms. Suppress fake Backspace.
          if (Date.now() - this._emptyKeyTs < 100) { this._emptyKeyTs = 0; return; }
          e.preventDefault();
          // v3: Physical keyboard Backspace — flush buffer then send immediately
          if (this.state === 'BUFFERING') {
            clearTimeout(this.bufferTimer); this.bufferTimer = null;
            this._flush();
          }
          this.send('\x7f');
          this.snapshot = this.snapshot.slice(0, -1);
          this.textarea.value = this.textarea.value.slice(0, -1);
          this._keydownHandled = true;
          _dbg('ACTION', '<b style="color:#f00">KD SEND DEL(\\x7f) immediate</b>');
        } else if (e.key === 'Delete') {
          e.preventDefault();
          this.send('\x1b[3~');
          this._keydownHandled = true;
          _dbg('ACTION', '<b style="color:#f00">KD SEND FWD-DEL</b>');
        }
      }, { signal });
    }

    // --- Lifecycle ---
    destroy() {
      if (this.bufferTimer) { clearTimeout(this.bufferTimer); this.bufferTimer = null; }
      if (this._abortController) { this._abortController.abort(); this._abortController = null; }
      this.snapshot = '';
      this.textarea.value = '';
      this._setState('IDLE');
    }
  }

  // Instantiate InputController — manages all textarea input events
  window._inputController = new InputController(overlayInput, wsSend);

  // File upload handler — reads photo, sends base64 to server, auto-types path into terminal
  document.getElementById('file-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const btn = _uploadBtnRef;
    if (btn) btn.textContent = '...';

    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: base64, filename: file.name })
        });
        const result = await res.json();
        if (result.path) {
          wsSend(result.path + ' ');
          if (btn) btn.textContent = 'OK!';
        } else {
          if (btn) btn.textContent = 'Fail';
        }
      } catch {
        if (btn) btn.textContent = 'Fail';
      }
      setTimeout(() => { if (btn) btn.textContent = '\u{1F4F7}'; }, 1500);
      e.target.value = ''; // Reset so same file can be re-selected
    };
    reader.readAsDataURL(file);
  });

  // Switch session from dropdown
  sessionSelect.addEventListener('change', () => {
    connect(sessionSelect.value);
  });

  // Init
  // Request notification permission early so the browser prompt appears on first load
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  loadSessions();
</script>
</body>
</html>
